name: Update CAMS Aerosol Data

# CADENCE: CAMS publishes 00Z + 12Z runs with ~10h delay (00Z guaranteed by
# 10:00 UTC, 12Z by 22:00 UTC). We cron 4×/day to catch each cycle ~1h after
# guaranteed availability. No need for the self-redispatch loop pattern that
# firestorm-lightning-data uses — CAMS isn't real-time, and `*/5` GHA throttling
# doesn't matter at this cadence.
#
# Times in UTC:
#   • 11:00 — 1h after 00Z guaranteed-ready
#   • 13:00 — buffer in case of late publication
#   • 23:00 — 1h after 12Z guaranteed-ready
#   • 01:00 — buffer
on:
  schedule:
    - cron: '0 11,13,23,1 * * *'
  workflow_dispatch:

permissions:
  contents: write     # to push current-aerosol.json

jobs:
  update:
    runs-on: ubuntu-latest
    concurrency:
      group: update-cams
      cancel-in-progress: false
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install eccodes (system lib for cfgrib)
        # cfgrib needs libeccodes installed at the OS level, not just the
        # Python wrapper. apt-get is fine on the ubuntu-latest runner.
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes0

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install cdsapi xarray cfgrib numpy

      - name: Fetch CAMS aerosol nowcast
        env:
          CDS_API_TOKEN: ${{ secrets.CDS_API_TOKEN }}
        run: python fetch_cams.py

      - name: Commit + push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/current-aerosol.json
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
            exit 0
          fi
          git commit -m "data: refresh CAMS aerosol nowcast"
          git push
